<!DOCTYPE html>
<html>
<head>
    <title>College Admission Portal</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h1{
            text-align: center;
            color: #333;
        }

        .container{
            display: flex;
            gap: 20px;
        }

        .form-section{
            width: 35%;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 0px 5px gray;
        }

        .table-section{
            width: 65%;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 0px 5px gray;
            overflow-x: auto;
        }

        label{
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .gender{
            width: auto;
            margin-top: 10px;
        }

        button{
            margin-top: 15px;
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
        }

        button:hover{
            background-color: #0056b3;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th{
            background-color: #007bff;
            color: white;
        }

        .edit-btn{
            background-color: orange;
            color: white;
            margin-right: 5px;
        }

        .delete-btn{
            background-color: red;
            color: white;
        }
    </style>
</head>

<body>

<h1>College Admission Portal</h1>

<div class="container">

    <div class="form-section">

        <label>First Name</label>
        <input type="text" id="fname">

        <label>Last Name</label>
        <input type="text" id="lname">

        <label>Email</label>
        <input type="email" id="email">

        <label>Phone Number</label>
        <input type="number" id="phone">

        <label>Age</label>
        <input type="number" id="age">

        <label>Gender</label>
        <input type="radio" name="gender" value="Male" class="gender"> Male
        <input type="radio" name="gender" value="Female" class="gender"> Female

        <label>Course</label>
        <select id="course">
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>IT</option>
        </select>

        <label>Address</label>
        <input type="text" id="address">

        <label>School Name</label>
        <input type="text" id="school">

        <label>12th Percentage</label>
        <input type="number" id="percentage">

        <button onclick="addData()">Submit</button>

    </div>

    <div class="table-section">

        <h3>Student Records</h3>

        <table id="studentTable">

            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Course</th>
                <th>Address</th>
                <th>School</th>
                <th>12th %</th>
                <th>Action</th>
            </tr>

        </table>

    </div>

</div>

<script>

function addData()
{
    let genderRadio = document.querySelector('input[name="gender"]:checked');

    if(genderRadio == null)
    {
        alert("Please select gender");
        return;
    }

    let gender = genderRadio.value;

    let table = document.getElementById("studentTable");

    let row = table.insertRow();

    row.insertCell(0).innerHTML = document.getElementById("fname").value;
    row.insertCell(1).innerHTML = document.getElementById("lname").value;
    row.insertCell(2).innerHTML = document.getElementById("email").value;
    row.insertCell(3).innerHTML = document.getElementById("phone").value;
    row.insertCell(4).innerHTML = document.getElementById("age").value;
    row.insertCell(5).innerHTML = gender;
    row.insertCell(6).innerHTML = document.getElementById("course").value;
    row.insertCell(7).innerHTML = document.getElementById("address").value;
    row.insertCell(8).innerHTML = document.getElementById("school").value;
    row.insertCell(9).innerHTML = document.getElementById("percentage").value;

    row.insertCell(10).innerHTML =
    "<button class='edit-btn' onclick='editRow(this)'>Edit</button>" +
    "<button class='delete-btn' onclick='deleteRow(this)'>Delete</button>";

    clearForm();
}

function editRow(button)
{
    let row = button.parentNode.parentNode;

    document.getElementById("fname").value = row.cells[0].innerHTML;
    document.getElementById("lname").value = row.cells[1].innerHTML;
    document.getElementById("email").value = row.cells[2].innerHTML;
    document.getElementById("phone").value = row.cells[3].innerHTML;
    document.getElementById("age").value = row.cells[4].innerHTML;

    let gender = row.cells[5].innerHTML;

    if(gender == "Male")
    {
        document.querySelector('input[value="Male"]').checked = true;
    }
    else
    {
        document.querySelector('input[value="Female"]').checked = true;
    }

    document.getElementById("course").value = row.cells[6].innerHTML;
    document.getElementById("address").value = row.cells[7].innerHTML;
    document.getElementById("school").value = row.cells[8].innerHTML;
    document.getElementById("percentage").value = row.cells[9].innerHTML;

    row.remove();
}

function deleteRow(button)
{
    if(confirm("Are you sure you want to delete this record?"))
    {
        let row = button.parentNode.parentNode;
        row.remove();
    }
}

function clearForm()
{
    document.getElementById("fname").value = "";
    document.getElementById("lname").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("age").value = "";
    document.getElementById("address").value = "";
    document.getElementById("school").value = "";
    document.getElementById("percentage").value = "";
    document.getElementById("course").selectedIndex = 0;

    let radios = document.getElementsByName("gender");

    for(let i = 0; i < radios.length; i++)
    {
        radios[i].checked = false;
    }
}

</script>

</body>
</html>
